[Commands]
1\Name=QR Code|Generate (to clipboard)
1\InMenu=true
1\Input=text/plain
1\Icon=\xf029
1\Command="
    copyq:
    var size = Number(settings('qrcode/pixel_size') || 10);
    var ec = String(settings('qrcode/error_correction') || 'M');
    var sel = selectedItems();
    var idx = (sel.length > 0) ? sel[0] : 0;
    var text = str(read(mimeText, idx));
    if (!text) { popup('QR Code', 'No text content'); abort(); }
    var r = execute('qrencode', '-o', '-', '-s', String(size), '-l', ec, '-t', 'PNG', text);
    if (r.exit_code !== 0) { popup('QR Code', 'qrencode error: ' + str(r.stderr)); abort(); }
    copy('image/png', r.stdout);
    popup('QR Code', 'QR code copied to clipboard');"
2\Name=QR Code|Generate (show)
2\InMenu=true
2\Input=text/plain
2\Icon=\xf06e
2\Command="
    copyq:
    var size = Number(settings('qrcode/pixel_size') || 10);
    var ec = String(settings('qrcode/error_correction') || 'M');
    var sel = selectedItems();
    var idx = (sel.length > 0) ? sel[0] : 0;
    var text = str(read(mimeText, idx));
    if (!text) { popup('QR Code', 'No text content'); abort(); }
    var tmp = Dir().tempPath() + '/copyq_qr_' + sha256sum(text).substring(0, 8) + '.png';
    var r = execute('qrencode', '-o', tmp, '-s', String(size), '-l', ec, '-t', 'PNG', text);
    if (r.exit_code !== 0) { popup('QR Code', 'qrencode error: ' + str(r.stderr)); abort(); }
    execute('bash', '-c', 'nohup eog ' + tmp + ' >/dev/null 2>&1 || nohup xdg-open ' + tmp + ' >/dev/null 2>&1 || nohup open ' + tmp + ' >/dev/null 2>&1 &');"
3\Name=QR Code|Generate (save to file)
3\InMenu=true
3\Input=text/plain
3\Icon=\xf0c7
3\Command="
    copyq:
    var size = Number(settings('qrcode/pixel_size') || 10);
    var ec = String(settings('qrcode/error_correction') || 'M');
    var defaultDir = String(settings('qrcode/default_dir') || Dir().homePath() + '/Documents');
    var sel = selectedItems();
    var idx = (sel.length > 0) ? sel[0] : 0;
    var text = str(read(mimeText, idx));
    if (!text) { popup('QR Code', 'No text content'); abort(); }
    var hash = sha256sum(text).substring(0, 8);
    var timestamp = dateString('HH-mm-ss_dd.MM.yyyy');
    var defaultName = 'qr_' + hash + '_' + timestamp + '.png';
    var filepath = dialog('.title', 'Save QR Code', 'Save as:', defaultDir + '/' + defaultName);
    if (!filepath) abort();
    var r = execute('qrencode', '-o', filepath, '-s', String(size), '-l', ec, '-t', 'PNG', text);
    if (r.exit_code !== 0) { popup('QR Code', 'qrencode error: ' + str(r.stderr)); abort(); }
    popup('QR Code', 'Saved: ' + filepath);"
4\Name=QR Code|Configure...
4\InMenu=true
4\Icon=\xf013
4\Command="
    copyq:
    var currentSize = String(settings('qrcode/pixel_size') || '10');
    var currentEc = String(settings('qrcode/error_correction') || 'M');
    var currentDir = String(settings('qrcode/default_dir') || Dir().homePath() + '/Documents');
    var ecLabels = ['L (7%)', 'M (15%)', 'Q (25%)', 'H (30%)'];
    var ecMap = {}; ecMap['L (7%)'] = 'L'; ecMap['M (15%)'] = 'M'; ecMap['Q (25%)'] = 'Q'; ecMap['H (30%)'] = 'H';
    var reverseEc = {}; reverseEc['L'] = 'L (7%)'; reverseEc['M'] = 'M (15%)'; reverseEc['Q'] = 'Q (25%)'; reverseEc['H'] = 'H (30%)';
    var defaultEc = reverseEc[currentEc] || 'M (15%)';
    var result = dialog('.title', 'QR Code Configuration', 'Pixel size:', currentSize, 'Default save folder:', currentDir, '.defaultChoice', defaultEc, '.combo:Error correction:', ecLabels);
    if (result === undefined) abort();
    var px = Number(result['Pixel size:']);
    if (px < 1 || px > 50) { popup('QR Code', 'Pixel size must be between 1 and 50'); abort(); }
    settings('qrcode/pixel_size', px);
    settings('qrcode/default_dir', result['Default save folder:']);
    settings('qrcode/error_correction', ecMap[result['Error correction:']]);
    var nl = String.fromCharCode(10);
    popup('QR Code', 'Configuration saved' + nl + 'Pixel size: ' + px + nl + 'Error correction: ' + result['Error correction:']);"
size=4
